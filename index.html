<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼국지 영걸전 - 웹 플레이</title>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        html, body, #dos { 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            overflow: hidden; 
        }
    </style>
</head>
<body>
    <div id="dos"></div>
    <script>
        // 최신 v8 문법에 맞춘 에뮬레이터 실행 코드
        Dos(document.getElementById("dos"), {
            url: "young.zip" // 방금 제대로 압축하신 영걸전 파일 연결
        });
    </script>
</body>
</html>
